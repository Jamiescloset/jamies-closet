const SafeImg = ({ srcs=[], alt="", style:st={} }) => {
  const [idx,setIdx]=useState(0);
  const [allFailed,setAllFailed]=useState(false);
  useEffect(()=>{setIdx(0);setAllFailed(false);},[srcs[0]]);
  if(allFailed||!srcs.length) return (
    <div style={{...st,background:"linear-gradient(145deg,#1a2028,#0d1318)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <svg width="60" height="60" viewBox="0 0 60 60"><circle cx="30" cy="30" r="26" fill="none" stroke="#9baab5" strokeWidth="1.5" opacity=".5"/><circle cx="30" cy="30" r="16" fill="none" stroke="#9baab5" strokeWidth="2" opacity=".7"/><circle cx="30" cy="30" r="5" fill="#9baab5"/></svg>
    </div>
  );
  return <img src={srcs[idx]} alt={alt} style={{...st,objectFit:"cover",display:"block"}} onError={()=>{ if(idx<srcs.length-1) setIdx(i=>i+1); else setAllFailed(true); }}/>;
};

const Stars = ({rating,size=13}) => {
  const full=Math.floor(rating), partial=rating%1;
  return <span style={{display:"inline-flex",alignItems:"center",gap:1}}>
    {Array.from({length:5},(_,i)=>{
      const fill=i<full?C.gold:i===full&&partial>0?`url(#h${i})`:"#e0d0c0";
      return <svg key={i} width={size} height={size} viewBox="0 0 24 24"><defs><linearGradient id={`h${i}`}><stop offset={`${partial*100}%`} stopColor={C.gold}/><stop offset={`${partial*100}%`} stopColor="#e0d0c0"/></linearGradient></defs><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill={fill}/></svg>;
    })}
  </span>;
};

const ProductCard = ({product,onAddToCart,onOpenModal}) => {
  const [hovered,setHovered]=useState(false);
  const [added,setAdded]=useState(false);
  const isSilver=product.category==="Silver";
  const badgeClr={"Bestseller":C.gold,"New":"#2d7d46","Sale":C.sale,"Premium":"#4a3080"};
  const disc=product.originalPrice?Math.round((1-product.price/product.originalPrice)*100):null;
  return (
    <div
      onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}
      onClick={()=>onOpenModal(product)}
      style={{background:"#fff",borderRadius:10,overflow:"hidden",border:`1px solid ${C.border}`,cursor:"pointer",transition:"transform 0.25s,box-shadow 0.25s",transform:hovered?"translateY(-4px)":"none",boxShadow:hovered?"0 16px 40px rgba(28,20,16,.13)":"0 2px 8px rgba(28,20,16,.06)",position:"relative"}}

// ── CHECKOUT ──
const Checkout = ({cart,onClose,onSuccess}) => {
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({name:"",email:"",phone:"",address:""});
  const [errors,setErrors]=useState({});
  const [proof,setProof]=useState(null);
  const [proofPreview,setProofPreview]=useState(null);
  const [submitting,setSubmitting]=useState(false);
  const [orderId]=useState(()=>"JC-"+Math.random().toString(36).toUpperCase().slice(2,6));
  const fileRef=useRef();
  const sub=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const ship=sub>FREE_SHIP_THRESHOLD?0:SHIP_FEE;
  const total=sub+ship;
  useEffect(()=>{document.body.style.overflow="hidden";return()=>{document.body.style.overflow="";};},[]);

  const validate=()=>{
    const e={};
    if(!form.name.trim())e.name="Name required";
    if(!form.email.match(/^[^@]+@[^@]+\.[^@]+$/))e.email="Valid email required";
    if(!form.phone.trim())e.phone="Phone/WhatsApp required";
    if(!form.address.trim())e.address="Address required";
    setErrors(e); return Object.keys(e).length===0;
  };

  const handleFile=(file)=>{
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement("canvas");
        const max=700; let w=img.width,h=img.height;
        if(w>max){h=Math.round(h*max/w);w=max;}
        if(h>max){w=Math.round(w*max/h);h=max;}
        canvas.width=w;canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        const b64=canvas.toDataURL("image/jpeg",0.65);
        setProof(b64);setProofPreview(b64);
      };img.src=ev.target.result;
    };reader.readAsDataURL(file);
  };

  const sendEmail=async()=>{
    const items=cart.map(i=>`${i.name} × ${i.qty} — $${(i.price*i.qty).toFixed(2)}`).join("\n");
    try{
      await fetch("https://api.emailjs.com/api/v1.0/email/send",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({service_id:EMAILJS_SVC,template_id:EMAILJS_TPL,user_id:EMAILJS_KEY,template_params:{order_id:orderId,customer_name:form.name,customer_email:form.email,customer_phone:form.phone,shipping_addr:form.address,items_list:items,subtotal:`$${sub.toFixed(2)}`,shipping:ship===0?"FREE":`$${SHIP_FEE}`,total:`$${total.toFixed(2)}`,cashtag:CASHTAG,screenshot:proof||"Not provided",to_email:STORE_EMAIL}})});
    }catch(err){console.log("EmailJS:",err);}
  };

  const submitOrder=async()=>{
    if(!proof){setErrors({proof:"Upload your CashApp screenshot to continue"});return;}
    setSubmitting(true);await sendEmail();setSubmitting(false);setStep(4);
  };

  const Field=({label,field,type="text",placeholder,multiline})=>(
    <div style={{marginBottom:16}}>
      <label style={{display:"block",fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:C.muted,marginBottom:6}}>{label}</label>
      {multiline
        ?<textarea value={form[field]} onChange={e=>setForm(f=>({...f,[field]:e.target.value}))} placeholder={placeholder} rows={3} style={{width:"100%",padding:"11px 14px",border:`1px solid ${errors[field]?C.sale:C.border2}`,borderRadius:7,fontSize:13,color:C.dark,background:"#fff",outline:"none",resize:"vertical"}}/>
        :<input type={type} value={form[field]} onChange={e=>setForm(f=>({...f,[field]:e.target.value}))} placeholder={placeholder} style={{width:"100%",padding:"11px 14px",border:`1px solid ${errors[field]?C.sale:C.border2}`,borderRadius:7,fontSize:13,color:C.dark,background:"#fff",outline:"none"}}/>
      }
      {errors[field]&&<div style={{fontSize:11,color:C.sale,marginTop:4}}>⚠ {errors[field]}</div>}
    </div>
  );

  const stepTitles=["","Your Details","CashApp Payment","Upload Proof","Order Confirmed!"];
  return (
    <div style={{position:"fixed",inset:0,zIndex:4000,display:"flex",alignItems:"center",justifyContent:"center",padding:12}}>
      <div style={{position:"absolute",inset:0,background:"rgba(20,14,10,.72)",backdropFilter:"blur(6px)"}} onClick={step===4?()=>{onSuccess();onClose();}:undefined}/>
      <div style={{position:"relative",zIndex:1,background:"#fff",borderRadius:14,width:"min(640px,100%)",maxHeight:"calc(100vh - 24px)",overflow:"hidden",display:"flex",flexDirection:"column",animation:"fadeUp 0.3s ease",boxShadow:"0 30px 80px rgba(0,0,0,.3)"}}>
        <div style={{padding:"20px 26px",borderBottom:`1px solid ${C.border}`,background:C.dark,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,color:"#fff"}}>{stepTitles[step]}</div>
            <div style={{display:"flex",gap:6,marginTop:8}}>
              {[1,2,3,4].map(s=><div key={s} style={{width:24,height:3,borderRadius:2,background:step>=s?C.gold:"rgba(255,255,255,.2)",transition:"background 0.3s"}}/>)}
            </div>
          </div>
          {step<4&&<button onClick={onClose} style={{color:"rgba(255,255,255,.55)",fontSize:22,padding:4}}>✕</button>}
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"24px"}}>
          {step===1&&(
            <>
              <Field label="Full Name" field="name" placeholder="Your name"/>
              <Field label="Email Address" field="email" type="email" placeholder="you@email.com"/>
              <Field label="Phone / WhatsApp" field="phone" placeholder="+1 (504) 000-0000"/>
              <Field label="Shipping Address" field="address" placeholder="Street, City, State, ZIP, Country" multiline/>
              <div style={{background:C.blush,borderRadius:10,padding:18,marginTop:4}}>
                <div style={{fontSize:11,letterSpacing:"0.15em",fontWeight:600,textTransform:"uppercase",color:C.muted,marginBottom:12}}>Order Summary</div>
                {cart.map(i=><div key={i.id} style={{display:"flex",justifyContent:"space-between",marginBottom:7,fontSize:13}}><span style={{color:C.text}}>{i.name} × {i.qty}</span><span style={{fontWeight:600}}>${(i.price*i.qty).toFixed(2)}</span></div>)}
                <div style={{borderTop:`1px solid ${C.border2}`,marginTop:10,paddingTop:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:C.muted,marginBottom:5}}><span>Subtotal</span><span>${sub.toFixed(2)}</span></div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:C.muted,marginBottom:8}}><span>Shipping</span><span style={{color:ship===0?C.green:undefined,fontWeight:ship===0?700:400}}>{ship===0?"FREE":`$${SHIP_FEE}`}</span></div>

            </>

                onDragOver={e=>e.preventDefault()}
                style={{border:`2px dashed ${errors.proof?C.sale:C.border2}`,borderRadius:12,padding:"28px 16px",textAlign:"center",cursor:"pointer",background:C.blush,marginBottom:16}}

          {step===4&&(
            <div style={{textAlign:"center",padding:"16px 0"}}>
              <div style={{width:76,height:76,background:`linear-gradient(135deg,${C.gold},${C.goldDark})`,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px",fontSize:32}}>✓</div>

                We'll process your order after payment is verified.<br/>
                A confirmation will be sent to <strong>{form.email}</strong>.
              </p>
              <div style={{background:C.blush,borderRadius:10,padding:18,marginBottom:22,textAlign:"left"}}>
                {cart.map(i=><div key={i.id} style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:13}}><span>{i.name} × {i.qty}</span><span style={{fontWeight:600}}>${(i.price*i.qty).toFixed(2)}</span></div>)}
                <div style={{borderTop:`1px solid ${C.border2}`,marginTop:10,paddingTop:10,display:"flex",justifyContent:"space-between",fontSize:16,fontWeight:700}}><span>Total Paid</span><span style={{color:C.gold}}>${total.toFixed(2)}</span></div>
              </div>
              <button onClick={()=>{onSuccess();onClose();}} style={{background:C.dark,color:"#fff",padding:"14px 32px",borderRadius:8,fontSize:13,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase"}}>Continue Shopping</button>
            </div>
          )}
        </div>
        {step<4&&(
          <div style={{padding:"14px 24px",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",gap:10}}>
            {step>1?<button onClick={()=>setStep(s=>s-1)} style={{padding:"12px 22px",border:`1px solid ${C.border2}`,borderRadius:8,fontSize:13,fontWeight:600,color:C.text}}>← Back</button>:<div/>}
            {step===1&&<button onClick={()=>{if(validate())setStep(2);}} style={{flex:1,background:C.dark,color:"#fff",padding:"14px",borderRadius:8,fontSize:13,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase"}}>Continue to Payment →</button>}
            {step===2&&<button onClick={()=>setStep(3)} style={{flex:1,background:C.green,color:"#fff",padding:"14px",borderRadius:8,fontSize:13,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase"}}>I've Sent Payment →</button>}
            {step===3&&<button onClick={submitOrder} disabled={submitting} style={{flex:1,background:submitting?C.muted:C.gold,color:"#fff",padding:"14px",borderRadius:8,fontSize:13,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",opacity:submitting?0.7:1}}>{submitting?"Submitting…":"Submit Order →"}</button>}
          </div>
        )}
      </div>
    </div>
  );
};

// ── SHOP PAGE ──
const ShopPage = ({products,onAddToCart,onOpenModal}) => {
  const [selCats,setSelCats]=useState([]);
  const [gender,setGender]=useState("All");
  const [subcat,setSubcat]=useState("All");
  const [price,setPrice]=useState("All");
  const [sort,setSort]=useState("Featured");
  const [sideOpen,setSideOpen]=useState(false);
  const allCats=[...new Set(products.map(p=>p.category))];

  const filtered=products.filter(p=>{
    if(selCats.length>0&&!selCats.includes(p.category))return false;
    if(selCats.includes("Silver")&&gender!=="All"&&p.category==="Silver"&&p.gender!==gender)return false;
    if(subcat!=="All"&&p.subcategory!==subcat)return false;
    if(price==="Under $75"&&p.price>=75)return false;
    if(price==="$75–$150"&&(p.price<75||p.price>150))return false;
    if(price==="$150–$300"&&(p.price<150||p.price>300))return false;
    if(price==="$300–$500"&&(p.price<300||p.price>500))return false;
    if(price==="$500+"&&p.price<500)return false;
    if(price==="On Sale"&&!p.originalPrice)return false;
    return true;
  }).sort((a,b)=>{
    if(sort==="Price Low–High")return a.price-b.price;
    if(sort==="Price High–Low")return b.price-a.price;
    if(sort==="Bestsellers")return(b.badge==="Bestseller"?1:0)-(a.badge==="Bestseller"?1:0);
    if(sort==="New Arrivals")return(b.badge==="New"?1:0)-(a.badge==="New"?1:0);
    return(b.badge==="Bestseller"?2:b.badge==="Premium"?1:0)-(a.badge==="Bestseller"?2:a.badge==="Premium"?1:0);
  });

  const subcats=selCats.length===1?[...new Set(products.filter(p=>p.category===selCats[0]).map(p=>p.subcategory))]:[];
  const toggle=(cat)=>setSelCats(prev=>prev.includes(cat)?prev.filter(c=>c!==cat):[...prev,cat]);

  const Sidebar=()=>(
    <div style={{fontSize:13}}>
      <div style={{marginBottom:26}}>
        <div style={{fontSize:10,letterSpacing:"0.2em",fontWeight:700,textTransform:"uppercase",color:C.muted,marginBottom:14}}>Category</div>
        {allCats.map(cat=>{
          const count=products.filter(p=>p.category===cat).length;
          return(
            <label key={cat} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,marginBottom:10,cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <input type="checkbox" checked={selCats.includes(cat)} onChange={()=>toggle(cat)} style={{width:15,height:15,accentColor:C.gold}}/>
                <span style={{color:selCats.includes(cat)?C.gold:C.text,fontWeight:selCats.includes(cat)?600:400}}>{cat}</span>
              </div>
              <span style={{fontSize:11,color:C.muted}}>{count}</span>
            </label>
          );
        })}
      </div>
      {selCats.includes("Silver")&&(
        <div style={{marginBottom:26}}>
          <div style={{fontSize:10,letterSpacing:"0.2em",fontWeight:700,textTransform:"uppercase",color:C.muted,marginBottom:14}}>Gender</div>
          {["All","Men's","Women's","Unisex"].map(g=>(
            <label key={g} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,cursor:"pointer"}}>
              <input type="radio" name="g" checked={gender===g} onChange={()=>setGender(g)} style={{accentColor:C.gold}}/>
              <span style={{color:gender===g?C.gold:C.text,fontWeight:gender===g?600:400}}>{g}</span>
            </label>
          ))}
        </div>
      )}
      {subcats.length>0&&(
        <div style={{marginBottom:26}}>
          <div style={{fontSize:10,letterSpacing:"0.2em",fontWeight:700,textTransform:"uppercase",color:C.muted,marginBottom:14}}>Subcategory</div>
          {["All",...subcats].map(s=>(
            <label key={s} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,cursor:"pointer"}}>
              <input type="radio" name="sc" checked={subcat===s} onChange={()=>setSubcat(s)} style={{accentColor:C.gold}}/>
              <span style={{color:subcat===s?C.gold:C.text,fontWeight:subcat===s?600:400,fontSize:12}}>{s}</span>
            </label>
          ))}
        </div>
      )}
      <div style={{marginBottom:26}}>
        <div style={{fontSize:10,letterSpacing:"0.2em",fontWeight:700,textTransform:"uppercase",color:C.muted,marginBottom:14}}>Price Range</div>
        {["All","Under $75","$75–$150","$150–$300","$300–$500","$500+","On Sale"].map(p=>(
          <label key={p} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,cursor:"pointer"}}>
            <input type="radio" name="p" checked={price===p} onChange={()=>setPrice(p)} style={{accentColor:C.gold}}/>
            <span style={{color:price===p?C.gold:p==="On Sale"?C.sale:C.text,fontWeight:price===p?600:400}}>{p}</span>
          </label>
        ))}
      </div>
      <button onClick={()=>{setSelCats([]);setGender("All");setSubcat("All");setPrice("All");setSideOpen(false);}} style={{width:"100%",padding:"10px",border:`1px solid ${C.border2}`,borderRadius:6,fontSize:12,color:C.muted,fontWeight:600}}>Clear Filters</button>
    </div>
  );

  return (
    <div style={{maxWidth:1320,margin:"0 auto",padding:"44px 22px 80px",display:"flex",gap:40,alignItems:"flex-start"}} className="jc-shop">
      <div style={{width:236,flexShrink:0,position:"sticky",top:84}} className="jc-shop-side">
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:600,marginBottom:22,color:C.dark}}>Filters</div>
        <Sidebar/>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:26,flexWrap:"wrap",gap:12}}>
          <div>
            <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:600,color:C.dark}}>{selCats.length===1?selCats[0]:"All Pieces"}</h1>
            <div style={{fontSize:12,color:C.muted,marginTop:3}}>{filtered.length} products</div>
          </div>

// ══════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════
function App() {
  const [page,setPage]=useState("home");
  const [cart,setCart]=useState([]);
  const [cartOpen,setCartOpen]=useState(false);
  const [checkoutOpen,setCheckoutOpen]=useState(false);
  const [modalProduct,setModalProduct]=useState(null);
  const cartCount=cart.reduce((s,i)=>s+i.qty,0);
  const nav=useCallback((p)=>{setPage(p);window.scrollTo({top:0,behavior:"smooth"});},[]);
  const addToCart=useCallback((product)=>{
    setCart(prev=>{
      const ex=prev.find(i=>i.id===product.id);
      if(ex)return prev.map(i=>i.id===product.id?{...i,qty:i.qty+1}:i);
      return [...prev,{...product,qty:1}];
    });
  },[]);
  const updateQty=useCallback((id,qty)=>setCart(prev=>prev.map(i=>i.id===id?{...i,qty}:i)),[]);
  const removeItem=useCallback((id)=>setCart(prev=>prev.filter(i=>i.id!==id)),[]);
  return (
    <>
      <style>{FONTS_CSS}</style>
      <Nav page={page} setPage={nav} cartCount={cartCount} setCartOpen={setCartOpen}/>
      <main style={{minHeight:"60vh"}}>
        {page==="home"&&<HomePage products={PRODUCTS} onAddToCart={addToCart} onOpenModal={setModalProduct} setPage={nav}/>}
        {page==="shop"&&<ShopPage products={PRODUCTS} onAddToCart={addToCart} onOpenModal={setModalProduct}/>}
        {page==="about"&&<AboutPage setPage={nav}/>}
        {page==="contact"&&<ContactPage/>}
      </main>
      <Footer setPage={nav}/>
      {modalProduct&&<ProductModal product={modalProduct} onClose={()=>setModalProduct(null)} onAddToCart={addToCart}/>}
      {cartOpen&&<CartDrawer cart={cart} onClose={()=>setCartOpen(false)} onUpdateQty={updateQty} onRemove={removeItem} onCheckout={()=>{setCartOpen(false);setCheckoutOpen(true);}}/>}
      {checkoutOpen&&cart.length>0&&<Checkout cart={cart} onClose={()=>setCheckoutOpen(false)} onSuccess={()=>setCart([])}/>}
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
